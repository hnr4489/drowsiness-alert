<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 AI Dashcam v2.0 - Active</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        #webcam { 
            border-radius: 20px; border: 5px solid #333; 
            width: 100%; max-width: 640px; transform: scaleX(-1); display: none; 
        }
        .alert { border-color: red !important; box-shadow: 0 0 50px red; }
        #status { font-size: 2rem; margin-top: 20px; color: lime; display: none; }
        .alert-text { color: red !important; text-shadow: 0 0 10px red; }
        #start-btn {
            padding: 15px 30px; font-size: 1.2rem; background-color: lime; color: black;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
        }
        #logout-btn {
            position: absolute; top: 20px; right: 20px; padding: 10px; 
            background: #ff4c4c; color: white; border: none; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>
    <button id="logout-btn" onclick="window.location.href='index.html'">Logout</button>
    
    <h1>🚗 AI Drowsiness Dashcam</h1>
    <p>Please ensure your face is well-lit.</p>
    
    <button id="start-btn" onclick="startSystem()">Start Camera & AI</button>
    
    <div id="loading" style="display:none; color: yellow; margin: 20px;">⏳ Loading AI Model... Please wait...</div>
    
    <div style="position: relative; display: inline-block; width: 100%; margin-top: 20px;">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div id="status">✅ Driver Focused</div>
    <h3 id="score" style="display: none;">Eye Height: 0px</h3>

    <script>
        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        const scoreText = document.getElementById('score');
        const loadingText = document.getElementById('loading');
        const startBtn = document.getElementById('start-btn');
        
        // Load alarm sound
        const alarm = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        alarm.loop = true;

        async function startSystem() {
            startBtn.style.display = 'none';
            loadingText.style.display = 'block';

            try {
                // This forces the browser permission popup!
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
                video.style.display = 'inline-block';
                
                // Wait for video to load
                await new Promise((resolve) => video.onloadedmetadata = () => resolve(video));

                // Load AI
                const model = faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh;
                const detector = await faceLandmarksDetection.createDetector(model, {
                    runtime: 'tfjs',
                    refineLandmarks: true
                });

                loadingText.style.display = 'none';
                statusText.style.display = 'block';
                scoreText.style.display = 'block';

                // Run detection loop
                setInterval(async () => {
                    const faces = await detector.estimateFaces(video);
                    if (faces.length > 0) {
                        const keypoints = faces[0].keypoints;
                        // MediaPipe indices for upper and lower eyelid
                        const eyeHeight = Math.abs(keypoints[159].y - keypoints[145].y);
                        scoreText.innerText = `Eye Height: ${eyeHeight.toFixed(1)}px`;

                        if (eyeHeight < 4.5) { // SENSITIVITY
                            statusText.innerText = "🚨 WAKE UP! 🚨";
                            statusText.className = "alert-text";
                            video.className = "alert";
                            alarm.play().catch(e => console.log("Audio autoplay blocked by browser"));
                        } else {
                            statusText.innerText = "✅ Driver Focused";
                            statusText.className = "";
                            video.className = "";
                            alarm.pause();
                            alarm.currentTime = 0;
                        }
                    }
                }, 100);

            } catch (err) {
                loadingText.innerText = "❌ Camera Access Denied. Please refresh and allow permissions.";
                loadingText.style.color = "red";
            }
        }
    </script>
</body>
</html>
